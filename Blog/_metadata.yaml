# Blog/_metadata.yml
execute:
  echo: true
  warning: false
  message: false
  error: false
  cache: false

format:
  html:
    code-fold: false
    code-overflow: wrap
    code-line-numbers: true
    highlight-style: github
    code-block-bg: "#f8f9fa"

# Default chunk options
knitr:
  opts_chunk:
    fig.width: 6
    fig.height: 4
    dpi: 150